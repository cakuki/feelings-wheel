name: Build & Release

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Install the Nunito font (pinned for deterministic rendering)
        run: |
          mkdir -p ~/.fonts
          curl -fsSL -o ~/.fonts/Nunito.ttf \
            "https://github.com/google/fonts/raw/main/ofl/nunito/Nunito%5Bwght%5D.ttf"
          fc-cache -f

      - name: Build every language and tier, and package downloadables
        env:
          CHROME: ${{ steps.chrome.outputs.chrome-path }}
        run: python3 build.py --package

      - name: Regenerate the landing page (previews + cards)
        run: python3 build_site.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: feelings-wheel
          path: dist/

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            Printable **Feelings Wheel** + monthly emotion tracker for kids.

            Three age levels per language — pick by how many rings:

            - `feelings-wheel-<lang>-1ring.*` — **ages 4–9**: the 6 core feelings.
            - `feelings-wheel-<lang>-2ring.*` — **ages 9–12**: core + 24 nuanced feelings (+ tracker).
            - `feelings-wheel-<lang>-3ring.*` — **ages 12+**: the full map, 48 fine feelings (+ tracker).

            Each `.pdf` is a ready-to-print A4 file; the `.zip` also includes the
            SVG, a preview image, and the printable HTML. (`feelings-wheel-<lang>.*`
            without a suffix is the 2-ring sheet, kept for older links.)

            Easiest of all: **https://cakuki.github.io/feelings-wheel/** — pick your
            language and age there.

            Languages: 🇬🇧 en · 🇩🇪 de · 🇪🇸 es · 🇫🇷 fr · 🇹🇷 tr
